<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Xtran 打刻</title>
<style>
:root{--nv:#2b3172;--nv-p:#eef0fa;--nv-m:#3a429e;--ok:#16a34a;--wa:#d97706;--ng:#dc2626;--t2:#6b7280;--t3:#9ca3af;--bd:rgba(43,49,114,0.13);--bd2:rgba(43,49,114,0.22)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#f1f3fb;min-height:100vh}
.header{background:var(--nv);padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:8px}
.logo svg{height:20px}
.greeting{font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px}
.emp-badge{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:4px 12px;font-size:12px;color:white;cursor:pointer}
.main{padding:14px;max-width:480px;margin:0 auto}
.clock-card{background:var(--nv);border-radius:14px;padding:22px 18px;text-align:center;margin-bottom:14px}
.clock-time{font-size:42px;font-weight:300;color:white;letter-spacing:0.04em;font-variant-numeric:tabular-nums;line-height:1}
.clock-date{font-size:12px;color:rgba(255,255,255,0.5);margin:6px 0 4px}
.status-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.1);border-radius:20px;padding:4px 12px;font-size:12px;color:rgba(255,255,255,0.8);margin-bottom:18px}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--t3)}
.punch-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pbtn{border-radius:10px;padding:14px 8px;font-size:15px;font-weight:500;cursor:pointer;border:none;transition:all 0.15s;letter-spacing:0.03em}
.pbtn:active{transform:scale(0.96)}
.pbtn-in{background:white;color:var(--nv)}
.pbtn-out{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.9);border:1px solid rgba(255,255,255,0.25)}
.break-note{margin-top:10px;font-size:11px;color:rgba(255,255,255,0.5)}
.notice{border-radius:10px;padding:11px 14px;font-size:13px;line-height:1.55;margin-bottom:12px;display:none}
.notice.ok{background:rgba(22,163,74,0.1);border:1px solid rgba(22,163,74,0.25);color:var(--ok)}
.notice.err{background:rgba(220,38,38,0.08);border:1px solid rgba(220,38,38,0.2);color:var(--ng)}
.notice.vis{display:block}
.section-title{font-size:11px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px}
.log-card{background:white;border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:14px}
.log-head{display:grid;grid-template-columns:1fr 1fr 1fr;padding:8px 12px;background:var(--nv-p)}
.log-head span{font-size:11px;color:var(--t3);font-weight:500;text-transform:uppercase;letter-spacing:0.05em}
.log-row{display:grid;grid-template-columns:1fr 1fr 1fr;padding:10px 12px;border-top:1px solid var(--bd)}
.log-row span{font-size:13px;color:var(--t2)}
.log-row .lt{font-weight:500}
.log-row .ltime{color:var(--nv-m);font-weight:500}
.log-empty{padding:16px;text-align:center;font-size:12px;color:var(--t3)}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.kpi-card{background:white;border:1px solid var(--bd);border-radius:10px;padding:12px 14px}
.kpi-label{font-size:11px;color:var(--t2);margin-bottom:5px}
.kpi-val{font-size:22px;font-weight:500;color:var(--nv)}
.kpi-val.sm{font-size:16px}
.kpi-note{font-size:11px;color:var(--t3);margin-top:3px}
.bar-list{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{font-size:12px;color:var(--t2);width:38px;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:16px;background:var(--nv-p);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;background:var(--nv);border-radius:4px;display:flex;align-items:center;padding-left:8px}
.bar-val{font-size:10px;color:rgba(255,255,255,0.9)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:flex-end}
.overlay.show{display:flex}
.modal{background:white;border-radius:16px 16px 0 0;width:100%;padding:16px;max-height:70vh;overflow-y:auto}
.modal-title{font-size:13px;font-weight:500;color:var(--t2);text-align:center;margin-bottom:14px}
.emp-btn{display:flex;align-items:center;gap:12px;width:100%;padding:12px 14px;border:1px solid var(--bd);border-radius:10px;background:white;margin-bottom:8px;cursor:pointer;transition:all 0.15s}
.emp-btn:active{background:var(--nv-p)}
.emp-av{width:36px;height:36px;border-radius:50%;background:var(--nv);color:white;font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.emp-name{font-size:14px;font-weight:500;color:var(--nv)}
.emp-role{font-size:12px;color:var(--t3)}
.punch-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end}
.punch-overlay.show{display:flex}
.punch-modal{background:white;border-radius:16px 16px 0 0;width:100%;padding:20px 16px;padding-bottom:calc(20px + env(safe-area-inset-bottom))}
.punch-modal-title{font-size:15px;font-weight:500;color:var(--nv);margin-bottom:4px}
.punch-modal-sub{font-size:12px;color:var(--t3);margin-bottom:16px}
.form-group{margin-bottom:12px}
.form-label{font-size:12px;font-weight:500;color:var(--t2);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.required{background:var(--ng);color:white;font-size:9px;padding:1px 5px;border-radius:3px}
.form-input,.form-select,.form-textarea{width:100%;background:var(--nv-p);border:1px solid var(--bd2);border-radius:8px;color:var(--nv);font-size:14px;padding:10px 12px;outline:none;font-family:inherit}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--nv)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.form-textarea{resize:none;height:80px;line-height:1.5}
.submit-btn{width:100%;background:var(--nv);border:none;color:white;border-radius:10px;padding:14px;font-size:15px;font-weight:500;cursor:pointer;transition:opacity 0.15s;margin-top:4px}
.submit-btn:active{opacity:0.85}
.cancel-link{display:block;text-align:center;margin-top:12px;font-size:13px;color:var(--t3);cursor:pointer}
.correction-note{background:rgba(217,119,6,0.08);border:1px solid rgba(217,119,6,0.2);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--wa);margin-bottom:12px;line-height:1.5;display:none}
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--bd);display:flex;padding-bottom:env(safe-area-inset-bottom)}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0 10px;cursor:pointer;gap:3px;color:var(--t3);transition:color 0.15s}
.tab-item svg{width:22px;height:22px}
.tab-item span{font-size:10px}
.tab-item.active{color:var(--nv)}
.pb-space{height:70px}
.loading{text-align:center;padding:24px;font-size:13px;color:var(--t3)}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <svg viewBox="0 0 120 30" fill="none">
      <line x1="4" y1="4" x2="18" y2="22" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <line x1="18" y1="4" x2="4" y2="22" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <line x1="12" y1="4" x2="26" y2="22" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <line x1="26" y1="4" x2="12" y2="22" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <circle cx="4" cy="26" r="3" fill="white"/>
      <circle cx="18" cy="26" r="3" fill="white"/>
      <text x="34" y="22" font-size="19" font-weight="500" fill="white" font-family="sans-serif">Xtran</text>
    </svg>
    <div class="greeting" id="greeting">おはようございます</div>
  </div>
  <div class="emp-badge" onclick="openEmpModal()" id="emp-badge">読み込み中...</div>
</div>

<div class="main">
  <div id="pg-punch">
    <div class="clock-card">
      <div class="clock-time" id="clock">--:--:--</div>
      <div class="clock-date" id="clock-date">---</div>
      <div class="status-pill">
        <div class="sdot" id="sdot"></div>
        <span id="status-text">未打刻</span>
      </div>
      <div class="punch-btns">
        <button class="pbtn pbtn-in" onclick="openPunchModal('出勤')">出勤</button>
        <button class="pbtn pbtn-out" onclick="openPunchModal('退勤')">退勤</button>
      </div>
      <div class="break-note">休憩（12:00〜13:00）は自動控除されます</div>
    </div>
    <div class="notice" id="notice"></div>
    <div class="section-title">本日の打刻履歴</div>
    <div class="log-card">
      <div class="log-head"><span>種別</span><span>時刻</span><span>状態</span></div>
      <div id="log-body"><div class="log-empty">まだ打刻がありません</div></div>
    </div>
  </div>

  <div id="pg-record" style="display:none">
    <div class="kpi-grid" id="kpi-grid"><div class="loading">読み込み中...</div></div>
    <div class="section-title">週別実労働時間</div>
    <div class="bar-list" id="bar-list"></div>
  </div>

  <div class="pb-space"></div>
</div>

<!-- 従業員選択モーダル -->
<div class="overlay" id="overlay" onclick="closeEmpModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">従業員を選択してください</div>
    <div id="emp-modal-list"><div class="loading">読み込み中...</div></div>
  </div>
</div>

<!-- 打刻モーダル（出勤・退勤共通） -->
<div class="punch-overlay" id="punch-overlay">
  <div class="punch-modal">
    <div class="punch-modal-title" id="punch-modal-title">出勤打刻</div>
    <div class="punch-modal-sub">日付・時刻を確認してください。修正も可能です。</div>
    <div class="correction-note" id="correction-note">打刻漏れの修正です。日付・時刻を正しく入力してください。</div>
    <div class="form-row">
      <div class="form-group" style="margin:0">
        <div class="form-label">日付 <span class="required">必須</span></div>
        <input type="date" class="form-input" id="punch-date" onchange="checkCorrectionMode()">
      </div>
      <div class="form-group" style="margin:0">
        <div class="form-label">時刻 <span class="required">必須</span></div>
        <input type="time" class="form-input" id="punch-time">
      </div>
    </div>
    <div id="checkout-fields" style="display:none">
      <div class="form-group">
        <div class="form-label">作業場所 <span class="required">必須</span></div>
        <select class="form-select" id="location-select">
          <option value="">選択してください</option>
          <option value="本社">本社</option>
          <option value="テレワーク">テレワーク</option>
          <option value="客先">客先</option>
          <option value="外出">外出</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-group">
        <div class="form-label">業務内容 <span class="required">必須</span></div>
        <textarea class="form-textarea" id="note-input" placeholder="本日の業務内容を入力してください"></textarea>
      </div>
    </div>
    <button class="submit-btn" id="punch-submit-btn" onclick="submitPunch()">出勤する</button>
    <span class="cancel-link" onclick="closePunchModal()">キャンセル</span>
  </div>
</div>

<!-- ボトムタブ -->
<div class="tab-bar">
  <div class="tab-item active" id="tab-punch" onclick="showPg('punch')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/>
    </svg>
    <span>打刻</span>
  </div>
  <div class="tab-item" id="tab-record" onclick="showPg('record')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <rect x="3" y="4" width="18" height="18" rx="2"/>
      <line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8" y1="2" x2="8" y2="6"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
    <span>勤怠確認</span>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxIIbBC3rKKwm4wiw13e7kRnQAM7-zdstkMeubwDOKFepa7mID4OnF0slvRNpBAsqaN/exec';

let currentEmp  = null;
let employees   = [];
let punchLogs   = [];
let punchState  = 'none'; // 'none' | 'in' | 'out'
let currentType = '出勤';

// ============================================================
//  初期化
// ============================================================
window.addEventListener('DOMContentLoaded', async () => {
  tickClock();
  setInterval(tickClock, 1000);

  const saved = localStorage.getItem('xtran_emp');
  if (saved) {
    try { currentEmp = JSON.parse(saved); } catch(e) {}
  }

  await loadEmployees();
  if (currentEmp) {
    updateEmpDisplay();
    await loadTodayLogs(); // ← 従業員確定後に今日のログを取得して状態を復元
  }
});

// ============================================================
//  時計
// ============================================================
function tickClock() {
  const n = new Date();
  document.getElementById('clock').textContent = n.toLocaleTimeString('ja-JP');
  const wd = ['日','月','火','水','木','金','土'];
  document.getElementById('clock-date').textContent =
    `${n.getFullYear()}年${n.getMonth()+1}月${n.getDate()}日（${wd[n.getDay()]}）`;
  const h = n.getHours();
  document.getElementById('greeting').textContent =
    h < 10 ? 'おはようございます' : h < 17 ? 'こんにちは' : 'お疲れ様です';
}

// ============================================================
//  従業員リスト取得
// ============================================================
async function loadEmployees() {
  try {
    const res = await fetch(`${API_URL}?action=getEmployees`);
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    if (!Array.isArray(data)) throw new Error('invalid data');
    employees = data;
    buildEmpModal();
    // ローカルに保存した従業員が従業員リストにいなければリセット
    if (currentEmp) {
      const found = employees.find(e => e.name === currentEmp.name);
      if (!found) currentEmp = null;
    }
    // 未選択なら最初の従業員をデフォルトにする
    if (!currentEmp && employees.length > 0) {
      currentEmp = employees[0];
      localStorage.setItem('xtran_emp', JSON.stringify(currentEmp));
      updateEmpDisplay();
    }
  } catch(e) {
    showNotice('従業員リストの取得に失敗しました。ページを再読み込みしてください。', 'err');
  }
}

function buildEmpModal() {
  document.getElementById('emp-modal-list').innerHTML = employees.map(e =>
    `<button class="emp-btn" onclick="selectEmp('${e.name.replace(/'/g,"\\'")}')">
      <div class="emp-av">${e.name.slice(0,2)}</div>
      <div style="text-align:left">
        <div class="emp-name">${e.name}</div>
        <div class="emp-role">${e.role} ／ 時給 ¥${Number(e.wage).toLocaleString()}</div>
      </div>
    </button>`
  ).join('');
}

function openEmpModal()  { document.getElementById('overlay').classList.add('show'); }
function closeEmpModal() { document.getElementById('overlay').classList.remove('show'); }

async function selectEmp(name) {
  currentEmp = employees.find(e => e.name === name);
  if (!currentEmp) return;
  localStorage.setItem('xtran_emp', JSON.stringify(currentEmp));
  updateEmpDisplay();
  closeEmpModal();
  punchLogs  = [];
  punchState = 'none';
  renderLogs();
  updateStatus('none');
  await loadTodayLogs(); // 従業員切替後にその人の今日のログを取得
}

function updateEmpDisplay() {
  document.getElementById('emp-badge').textContent = currentEmp ? currentEmp.name : '未選択';
}

// ============================================================
//  打刻モーダル
// ============================================================
function openPunchModal(type) {
  if (!currentEmp) { showNotice('従業員を選択してください', 'err'); return; }
  if (type === '出勤' && punchState === 'in') {
    showNotice('すでに出勤打刻済みです', 'err'); return;
  }
  if (type === '退勤' && punchState !== 'in') {
    showNotice('出勤打刻をしてから退勤してください', 'err'); return;
  }

  currentType = type;

  const now     = new Date();
  const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  document.getElementById('punch-date').value        = dateStr;
  document.getElementById('punch-time').value        = timeStr;
  document.getElementById('punch-modal-title').textContent  = type + '打刻';
  document.getElementById('punch-submit-btn').textContent   = type + 'する';
  document.getElementById('correction-note').style.display = 'none';
  document.getElementById('checkout-fields').style.display = type === '退勤' ? 'block' : 'none';

  if (type === '退勤') {
    document.getElementById('location-select').value = '';
    document.getElementById('note-input').value      = '';
  }

  document.getElementById('punch-overlay').classList.add('show');
}

function closePunchModal() {
  document.getElementById('punch-overlay').classList.remove('show');
}

function checkCorrectionMode() {
  const now      = new Date();
  const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const selected = document.getElementById('punch-date').value;
  document.getElementById('correction-note').style.display = selected !== todayStr ? 'block' : 'none';
}

// ============================================================
//  打刻送信
// ============================================================
async function submitPunch() {
  const dateVal = document.getElementById('punch-date').value;
  const timeVal = document.getElementById('punch-time').value;

  if (!dateVal) { alert('日付を入力してください'); return; }
  if (!timeVal) { alert('時刻を入力してください'); return; }

  const parts   = dateVal.split('-');
  const dateStr = `${parts[0]}/${parts[1]}/${parts[2]}`;
  const wd      = ['日','月','火','水','木','金','土'];
  const dayStr  = wd[new Date(dateVal).getDay()];

  let location = '';
  let note     = '';
  if (currentType === '退勤') {
    location = document.getElementById('location-select').value;
    note     = document.getElementById('note-input').value.trim();
    if (!location) { alert('作業場所を選択してください'); return; }
    if (!note)     { alert('業務内容を入力してください'); return; }
  }

  closePunchModal();

  // ローカルに即時反映
  punchLogs.unshift({ type: currentType, time: timeVal, state: '送信中' });
  renderLogs();
  updateStatus(currentType === '出勤' ? 'in' : 'out');

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({
        userName:    currentEmp.name,
        date:        dateStr,
        day:         dayStr,
        timeIn:      currentType === '出勤' ? timeVal : '',
        timeOut:     currentType === '退勤' ? timeVal : '',
        location:    location,
        note:        note,
        workMinutes: 0,
        fixed:       false
      })
    });
    const text = await res.text();
    if (text === 'ok') {
      punchLogs[0].state = '記録済';
      renderLogs();
      showNotice(currentType === '退勤'
        ? '退勤打刻が完了しました。お疲れ様でした！'
        : '出勤打刻が完了しました。', 'ok');
    } else {
      throw new Error('not ok');
    }
  } catch(e) {
    punchLogs[0].state = '未送信';
    renderLogs();
    showNotice('送信に失敗しました。再度お試しください。', 'err');
    // 状態を元に戻す
    if (currentType === '出勤') updateStatus('none');
    else updateStatus('in');
  }
}

// ============================================================
//  今日のログをスプレッドシートから取得して状態を復元
// ============================================================
async function loadTodayLogs() {
  if (!currentEmp) return;
  const today = new Date();
  const month = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
  const todayStr = `${today.getFullYear()}/${String(today.getMonth()+1).padStart(2,'0')}/${String(today.getDate()).padStart(2,'0')}`;
  try {
    const res  = await fetch(`${API_URL}?action=getLogs&empName=${encodeURIComponent(currentEmp.name)}&month=${month}`);
    if (!res.ok) return;
    const logs = await res.json();
    if (!Array.isArray(logs)) return;

    const todays = logs.filter(l => {
      const d = l.date ? String(l.date) : '';
      return d.startsWith(todayStr) || d.replace(/-/g,'/').startsWith(todayStr);
    });

    punchLogs = [];
    todays.forEach(l => {
      const inT  = l.timeIn  ? String(l.timeIn).slice(0,5)  : '';
      const outT = l.timeOut ? String(l.timeOut).slice(0,5) : '';
      if (inT)  punchLogs.push({ type:'出勤', time: inT,  state:'記録済' });
      if (outT) punchLogs.push({ type:'退勤', time: outT, state:'記録済' });
    });
    punchLogs.sort((a,b) => b.time.localeCompare(a.time)); // 新しい順
    renderLogs();

    // 状態を復元
    const hasOut = todays.some(l => l.timeOut && String(l.timeOut).trim() !== '');
    const hasIn  = todays.some(l => l.timeIn  && String(l.timeIn).trim()  !== '');
    if (hasOut)      updateStatus('out');
    else if (hasIn)  updateStatus('in');
    else             updateStatus('none');
  } catch(e) {
    // オフライン等では無視
  }
}

// ============================================================
//  UI更新
// ============================================================
function renderLogs() {
  const el = document.getElementById('log-body');
  if (!punchLogs.length) {
    el.innerHTML = '<div class="log-empty">まだ打刻がありません</div>';
    return;
  }
  const c = { 出勤:'var(--ok)', 退勤:'var(--t2)' };
  el.innerHTML = punchLogs.map(p =>
    `<div class="log-row">
      <span class="lt" style="color:${c[p.type]||'var(--t2)'}">${p.type}</span>
      <span class="ltime">${p.time}</span>
      <span>${p.state}</span>
    </div>`
  ).join('');
}

function updateStatus(state) {
  punchState = state;
  const dot = document.getElementById('sdot');
  const txt = document.getElementById('status-text');
  const map = {
    none: ['var(--t3)', '未打刻'],
    in:   ['var(--ok)', '出勤中'],
    out:  ['var(--t2)', '退勤済']
  };
  dot.style.background = map[state][0];
  txt.textContent      = map[state][1];
}

function showNotice(msg, type) {
  const el = document.getElementById('notice');
  el.textContent = msg;
  el.className   = `notice ${type} vis`;
  setTimeout(() => el.classList.remove('vis'), 6000);
}

function showPg(id) {
  ['punch','record'].forEach(p => {
    document.getElementById('pg-'+p).style.display = p === id ? 'block' : 'none';
    document.getElementById('tab-'+p).classList.toggle('active', p === id);
  });
  if (id === 'record') buildRecord();
}

// ============================================================
//  勤怠確認
// ============================================================
async function buildRecord() {
  if (!currentEmp) return;
  const today = new Date();
  const month = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
  try {
    const res  = await fetch(`${API_URL}?action=getSummary&month=${month}`);
    const rows = await res.json();
    const mine = Array.isArray(rows) ? rows.filter(r => r.name === currentEmp.name) : [];
    const totalWork  = mine.reduce((s,r) => s + (Number(r.workMin)||0), 0) / 60;
    const totalOt    = mine.reduce((s,r) => s + (Number(r.otMin)||0),   0) / 60;
    const totalNight = mine.reduce((s,r) => s + (Number(r.nightMin)||0),0) / 60;
    const totalPay   = mine.reduce((s,r) => s + (Number(r.totalPay)||0),0);
    document.getElementById('kpi-grid').innerHTML = [
      ['実労働時間', totalWork.toFixed(1)+'h',  '休憩除く'],
      ['残業時間',   totalOt.toFixed(1)+'h',    '1.25倍'],
      ['深夜労働',   totalNight.toFixed(1)+'h', '22時以降'],
      ['概算給与',   '¥'+Math.round(totalPay).toLocaleString(), '確定前'],
    ].map(([l,v,n]) =>
      `<div class="kpi-card">
        <div class="kpi-label">${l}</div>
        <div class="kpi-val${v.length>8?' sm':''}">${v}</div>
        <div class="kpi-note">${n}</div>
      </div>`
    ).join('');
  } catch(e) {
    document.getElementById('kpi-grid').innerHTML = '<div class="log-empty">データを取得できませんでした</div>';
  }
}
</script>
